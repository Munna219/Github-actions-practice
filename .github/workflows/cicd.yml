name: CICD
on:
  workflow_dispatch:
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: clone the code
        run: echo "cloning the code"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: build using Docker
        run: echo "building using Docker"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Running test cases
        run: echo "testing the application"

  deploy:
    needs: test
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Deploying on the code
        run: echo "Deploying the code"
